name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2        # ✅ Fix: hapus duplikat "uses:"

      - name: Inject BUILD_TIMESTAMP ke sw.js
        run: |
          BUILD_TS=$(date +%s)
          echo "BUILD_TIMESTAMP = $BUILD_TS"
          sed -i "s/__BUILD_TS__/$BUILD_TS/g" sw.js   # ✅ Fix: sw.js ada di root
          grep "CACHE_NAME" sw.js

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload ke Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .                            # ✅ Fix: upload dari root, bukan ./frontend

      - name: Deploy ke GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
